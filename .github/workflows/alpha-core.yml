name: Alpha Core

on:
  push:
    paths:
      - betbot/**
      - tests/test_kalshi_temperature_metar_ingest.py
      - tests/test_kalshi_temperature_weather_pattern.py
      - tests/test_kalshi_temperature_selection_quality.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_execution_cost_tape.py
      - Makefile
      - .github/workflows/alpha-core.yml
  pull_request:
    paths:
      - betbot/**
      - tests/test_kalshi_temperature_metar_ingest.py
      - tests/test_kalshi_temperature_weather_pattern.py
      - tests/test_kalshi_temperature_selection_quality.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_execution_cost_tape.py
      - Makefile
      - .github/workflows/alpha-core.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alpha-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alpha-core:
    runs-on: ubuntu-latest
    timeout-minutes: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock.txt
            requirements-dev.txt
            requirements-dev.lock.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and locked dev dependencies
        run: make install-dev

      - name: Run alpha core regression suite
        run: make test-alpha-core

      - name: Verify clean tree after alpha core suite
        run: git diff --exit-code
