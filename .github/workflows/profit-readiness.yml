name: Profit Readiness

on:
  push:
    paths:
      - betbot/**
      - tests/test_decision_matrix_hardening.py
      - tests/test_kalshi_temperature_bankroll_validation.py
      - tests/test_kalshi_temperature_recovery_advisor.py
      - tests/test_kalshi_temperature_recovery_campaign.py
      - tests/test_kalshi_temperature_recovery_loop.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_selection_quality.py
      - Makefile
      - .github/workflows/profit-readiness.yml
  pull_request:
    paths:
      - betbot/**
      - tests/test_decision_matrix_hardening.py
      - tests/test_kalshi_temperature_bankroll_validation.py
      - tests/test_kalshi_temperature_recovery_advisor.py
      - tests/test_kalshi_temperature_recovery_campaign.py
      - tests/test_kalshi_temperature_recovery_loop.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_selection_quality.py
      - Makefile
      - .github/workflows/profit-readiness.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profit-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profit-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock.txt
            requirements-dev.txt
            requirements-dev.lock.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and locked dev dependencies
        run: make install-dev

      - name: Run profit readiness regression suite
        run: make test-profit-readiness

      - name: Verify clean tree after profit readiness suite
        run: git diff --exit-code
