name: Trading Confidence

on:
  push:
    paths:
      - betbot/**
      - infra/digitalocean/**
      - tests/test_kalshi_temperature_metar_ingest.py
      - tests/test_kalshi_temperature_weather_pattern.py
      - tests/test_kalshi_temperature_selection_quality.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_execution_cost_tape.py
      - tests/test_decision_matrix_hardening.py
      - tests/test_kalshi_temperature_bankroll_validation.py
      - tests/test_kalshi_temperature_recovery_advisor.py
      - tests/test_kalshi_temperature_recovery_campaign.py
      - tests/test_kalshi_temperature_recovery_loop.py
      - tests/test_bootstrap_ubuntu_2404_script.py
      - tests/test_preflight_temperature_shadow_script.py
      - tests/test_install_systemd_temperature_shadow_script.py
      - tests/test_install_systemd_temperature_recovery_script.py
      - tests/test_install_systemd_temperature_coldmath_hardening_script.py
      - tests/test_set_coldmath_recovery_env_persistence_gate_script.py
      - tests/test_alpha_core_workflow_sync.py
      - tests/test_profit_readiness_workflow_sync.py
      - tests/test_gatechain_workflow_sync.py
      - tests/test_trading_confidence_workflow_sync.py
      - Makefile
      - .github/workflows/trading-confidence.yml
      - .github/workflows/alpha-core.yml
      - .github/workflows/profit-readiness.yml
      - .github/workflows/gatechain-smoke.yml
  pull_request:
    paths:
      - betbot/**
      - infra/digitalocean/**
      - tests/test_kalshi_temperature_metar_ingest.py
      - tests/test_kalshi_temperature_weather_pattern.py
      - tests/test_kalshi_temperature_selection_quality.py
      - tests/test_kalshi_temperature_profitability.py
      - tests/test_kalshi_temperature_growth_optimizer.py
      - tests/test_kalshi_temperature_execution_cost_tape.py
      - tests/test_decision_matrix_hardening.py
      - tests/test_kalshi_temperature_bankroll_validation.py
      - tests/test_kalshi_temperature_recovery_advisor.py
      - tests/test_kalshi_temperature_recovery_campaign.py
      - tests/test_kalshi_temperature_recovery_loop.py
      - tests/test_bootstrap_ubuntu_2404_script.py
      - tests/test_preflight_temperature_shadow_script.py
      - tests/test_install_systemd_temperature_shadow_script.py
      - tests/test_install_systemd_temperature_recovery_script.py
      - tests/test_install_systemd_temperature_coldmath_hardening_script.py
      - tests/test_set_coldmath_recovery_env_persistence_gate_script.py
      - tests/test_alpha_core_workflow_sync.py
      - tests/test_profit_readiness_workflow_sync.py
      - tests/test_gatechain_workflow_sync.py
      - tests/test_trading_confidence_workflow_sync.py
      - Makefile
      - .github/workflows/trading-confidence.yml
      - .github/workflows/alpha-core.yml
      - .github/workflows/profit-readiness.yml
      - .github/workflows/gatechain-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trading-confidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trading-confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock.txt
            requirements-dev.txt
            requirements-dev.lock.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and locked dev dependencies
        run: make install-dev

      - name: Run trading confidence regression suite
        run: make test-trading-confidence

      - name: Verify clean tree after trading confidence suite
        run: git diff --exit-code
